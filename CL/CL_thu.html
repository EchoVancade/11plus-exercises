<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CL Exercises</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── CL THEME ── orange */
:root{--hdr:linear-gradient(135deg,#FF6B35,#E85D04);--bg:#FFF8F0;--acc:#E85D04;--acc2:#FF6B35;--vocab:#7B2D8B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;padding-bottom:72px}
body.snake{--hi:#27AE60} body.shark{--hi:#2980B9}
/* header */
.hdr{background:var(--hdr);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.hdr-l h1{color:#fff;font-size:.95rem;font-weight:900;line-height:1.2} .hdr-l p{color:rgba(255,255,255,.75);font-size:.74rem}
.hdr-r{display:flex;gap:8px;align-items:center}
.hdr-char{font-size:1.6rem}
.voice-pill{font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.2);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.3);white-space:nowrap}
.voice-pill.natural{background:rgba(34,197,94,.3);color:#fff;border-color:rgba(34,197,94,.5)}
.settings-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:5px 10px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
/* rules card */
.rw{padding:10px 14px 0}
.rules-card{background:#1e293b;border:2px solid rgba(255,255,255,.12);border-radius:14px;overflow:hidden}
.rules-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.rules-title{color:#f1f5f9;font-size:.85rem;font-weight:900} .rules-arrow{color:#64748b;font-size:.75rem}
.rules-body{padding:8px 14px 4px}
.tip-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;color:#94a3b8;font-size:.82rem;line-height:1.45}
.tip-code{background:rgba(249,115,22,.2);color:#fb923c;border-radius:6px;padding:1px 7px;font-weight:800;font-size:.72rem;flex-shrink:0;margin-top:1px}
.rules-confirm{width:100%;margin-top:10px;background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border:none;border-radius:10px;padding:11px;font-weight:900;font-family:'Nunito',sans-serif;font-size:.88rem;cursor:pointer;margin-bottom:8px}
/* sections */
.ex-wrap{padding:10px 14px;display:flex;flex-direction:column;gap:12px}
.section-card{border-radius:14px;padding:14px}
.section-label{font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.8);margin-bottom:10px}
.vocab-card{background:var(--vocab)} .english-card{background:#0077B6} .maths-card{background:#2D9E2D} .writing-card{background:#166534}
/* questions */
.qc{background:rgba(255,255,255,.13);border-radius:10px;padding:11px;margin-bottom:9px;border-left:4px solid transparent}
.qc.right{border-left-color:#22c55e} .qc.wrong{border-left-color:#ef4444}
.q-text{color:#fff;font-size:.88rem;font-weight:700;line-height:1.5;margin-bottom:9px} .q-star{color:#fbbf24}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.opt{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 9px;color:#fff;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;text-align:left;display:flex;gap:5px;align-items:flex-start;min-height:44px;-webkit-tap-highlight-color:transparent}
.opt:active{transform:scale(.97)}
.opt.sc{background:#22c55e!important;color:#fff!important;border-color:#22c55e!important}
.opt.sw{background:#ef4444!important;color:#fff!important;border-color:#ef4444!important}
.opt.rc2{outline:3px solid #22c55e} .opt.dis{pointer-events:none;opacity:.55}
.ok{font-size:.68rem;background:rgba(0,0,0,.2);border-radius:4px;padding:1px 5px;flex-shrink:0;margin-top:1px}
/* writing */
.writing-prompt{background:rgba(255,255,255,.12);border-radius:10px;padding:11px;margin-bottom:9px}
.mission-id{font-size:.7rem;font-weight:800;color:rgba(255,255,255,.65);margin-bottom:3px}
.mission-title{font-size:.95rem;font-weight:900;color:#fff;margin-bottom:5px}
.mission-codes{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.code-tag{background:rgba(255,255,255,.2);color:#fff;border-radius:6px;padding:2px 7px;font-size:.7rem;font-weight:800}
.mission-prompt{font-size:.84rem;color:rgba(255,255,255,.9);line-height:1.5}
.writing-ta{width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;font-family:'Nunito',sans-serif;padding:9px;resize:none;min-height:90px;margin-top:8px;font-size:.86rem}
.writing-ta::placeholder{color:rgba(255,255,255,.4)}
.writing-send-btn{width:100%;margin-top:8px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:10px;padding:10px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;font-size:.88rem}
.writing-fb{background:rgba(255,255,255,.12);border-radius:10px;padding:10px;margin-top:8px;color:#fff;font-size:.84rem;line-height:1.5;display:none}
/* submit bar */
.sub-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid rgba(0,0,0,.1);padding:9px 14px;display:flex;align-items:center;gap:10px;z-index:50}
.pts-display{font-size:.8rem;font-weight:800;color:var(--acc);flex:1}
.sub-btn{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border:none;border-radius:10px;padding:10px 22px;font-weight:900;font-family:'Nunito',sans-serif;font-size:.9rem;cursor:pointer}
.sub-btn:disabled{opacity:.4;cursor:default}
/* remediation */
.rem-banner{background:#1e293b;border-top:3px solid var(--acc);padding:10px 14px;text-align:center}
.rem-banner p{color:#f1f5f9;font-size:.86rem;font-weight:700}
/* overlay — full screen v3.14 */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,15,30,.97);z-index:100;flex-direction:column}
.overlay.open{display:flex}
.ov-header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.ov-char{font-size:1.8rem} .ov-title{flex:1;color:#f1f5f9;font-size:.86rem;font-weight:800}
.skip-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#94a3b8;border-radius:8px;padding:5px 11px;font-size:.76rem;cursor:pointer;font-family:'Nunito',sans-serif}
.dots{display:flex;gap:4px;padding:8px 14px 0;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18)} .dot.used{background:rgba(249,115,22,.7)}
.ov-bubbles{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:9px;-webkit-overflow-scrolling:touch}
.bub{max-width:88%;padding:10px 13px;border-radius:14px;font-size:.88rem;line-height:1.6}
.bub.echo{align-self:flex-start;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);color:#f1f5f9}
.bub.user{align-self:flex-end;background:#fff;color:#1e293b;font-weight:700}
.typing{display:flex;gap:5px;align-items:center;padding:10px 12px;background:rgba(255,255,255,.08);border-radius:12px;align-self:flex-start}
.typing span{width:7px;height:7px;border-radius:50%;background:#94a3b8;animation:bop .8s infinite}
.typing span:nth-child(2){animation-delay:.15s} .typing span:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.ov-input{padding:10px 14px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;background:rgba(0,0,0,.25)}
.mstat{font-size:.73rem;color:#64748b;margin-bottom:5px}
.speech-ta{width:100%;background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.14);border-radius:10px;color:#f1f5f9;font-family:'Nunito',sans-serif;font-size:.86rem;padding:8px 11px;resize:none;min-height:65px}
.speech-ta::placeholder{color:#475569}
.ov-btns{display:flex;gap:7px;margin-top:7px}
.mic-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:8px 13px;font-size:.95rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mic-btn.listening{background:rgba(239,68,68,.3);border-color:#ef4444;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
.send-btn{flex:1;background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);color:#86efac;border-radius:8px;padding:8px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}
.gotit-btn{background:rgba(249,115,22,.2);border:1px solid rgba(249,115,22,.35);color:#fb923c;border-radius:8px;padding:8px 13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}
/* result */
.result-screen{padding:28px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.res-emoji{font-size:3.2rem} .res-score{font-size:1.8rem;font-weight:900;color:#1e293b}
.res-msg{font-size:.92rem;color:#475569;max-width:280px;line-height:1.6}
.res-pts{font-size:.95rem;font-weight:800;color:var(--acc)}
/* dictionary */
.dict-wrap{background:#C77800;border-radius:14px;padding:14px;margin:10px 0;width:100%}
.dict-word{font-size:1.25rem;font-weight:900;color:#fff;margin-bottom:3px}
.dict-def{font-size:.86rem;color:rgba(255,255,255,.9);margin-bottom:5px;line-height:1.5}
.dict-eg{font-size:.8rem;color:rgba(255,255,255,.75);font-style:italic;margin-bottom:10px}
.dict-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:9px 14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;width:100%;display:block;text-align:center;margin-bottom:7px}
.rev-block{background:rgba(0,0,0,.15);border-radius:10px;padding:10px 11px;margin-top:6px}
.rev-word{font-size:.84rem;font-weight:800;color:#fff;margin-bottom:2px} .rev-def{font-size:.79rem;color:rgba(255,255,255,.8)}
/* settings overlay */
.key-card{background:#111827;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:22px;max-width:360px;width:100%}
.key-title{color:#f1f5f9;font-size:.95rem;font-weight:900;margin-bottom:14px}
.key-label{display:block;color:#94a3b8;font-size:.78rem;font-weight:700;margin-bottom:5px}
.key-req{color:#fb923c;font-weight:400} .key-opt{color:#475569;font-weight:400}
.key-input{width:100%;padding:9px 11px;background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#f1f5f9;font-size:.83rem;font-family:'Nunito',sans-serif;margin-bottom:12px}
.key-note{color:#475569;font-size:.73rem;margin-bottom:14px;line-height:1.4}
.key-btns{display:flex;gap:8px}
.key-save{flex:1;background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border:none;border-radius:8px;padding:10px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif}
.key-close{background:rgba(255,255,255,.07);color:#94a3b8;border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:10px 14px;cursor:pointer;font-family:'Nunito',sans-serif}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-l"><h1 id="hdr-title">CL Exercises</h1><p id="hdr-sub">Week 0</p></div>
  <div class="hdr-r">
    <span id="voice-pill" class="voice-pill">🔊 Device</span>
    <span id="hdr-char" class="hdr-char">?</span>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </div>
</div>

<!-- RULES CARD -->
<div class="rw">
  <div class="rules-card">
    <div class="rules-hdr" onclick="toggleRules()">
      <span class="rules-title" id="rh-title">⚡ TODAY'S WEAPONS — tap to read</span>
      <span class="rules-arrow" id="rh-arrow">▼</span>
    </div>
    <div class="rules-body" id="rb" style="display:none">
      <div id="rules-tips"></div>
      <button class="rules-confirm" onclick="markRulesRead()">I'm ready — let's go! 🚀</button>
    </div>
  </div>
</div>

<!-- MAIN CONTENT (locked until rules read — v3.14) -->
<div id="main-content" style="pointer-events:none;opacity:.45">
  <div id="ex-wrap" class="ex-wrap">
    <div id="vocab-section"></div>
    <div id="english-section"></div>
    <div id="maths-section"></div>
    <div id="writing-section" style="display:none"></div>
  </div>
</div>

<!-- DICTIONARY — Section 5, always visible -->
<div id="dict-section" style="padding:0 14px 14px"></div>

<!-- SUBMIT BAR -->
<div id="sub-bar" class="sub-bar">
  <div id="pts-display" class="pts-display">⭐ 0 pts — 0/16 answered</div>
  <button id="sub-btn" class="sub-btn" onclick="handleSubmit()" disabled>Submit ✓</button>
</div>

<!-- REMEDIATION BANNER -->
<div id="remed-banner" style="display:none" class="rem-banner"><p id="rem-msg"></p></div>

<!-- ECHO OVERLAY (full screen — v3.14) -->
<div id="overlay" class="overlay">
  <div class="ov-header">
    <span id="ov-char" class="ov-char">?</span>
    <div id="ov-title" class="ov-title">Echo is thinking…</div>
    <button class="skip-btn" onclick="parentSkip()">Skip ⏭</button>
  </div>
  <div id="dots" class="dots"></div>
  <div id="ov-bubbles" class="ov-bubbles"></div>
  <div class="ov-input">
    <div id="mstat" class="mstat">Tap 🎤 to speak, or type below</div>
    <textarea id="speech-text" class="speech-ta" placeholder="Type or speak your answer…" rows="3"></textarea>
    <div class="ov-btns">
      <button id="mbtn" class="mic-btn" onclick="toggleMic()">🎤</button>
      <button class="send-btn" onclick="submitSpeech()">Send ➤</button>
      <button class="gotit-btn" onclick="gotIt()">Got it ✓</button>
    </div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result" style="display:none" class="result-screen">
  <div id="res-emoji" class="res-emoji"></div>
  <div id="res-score" class="res-score"></div>
  <div id="res-msg" class="res-msg"></div>
  <div id="res-pts" class="res-pts"></div>
</div>

<!-- SETTINGS OVERLAY -->
<div id="key-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;align-items:center;justify-content:center;padding:20px">
  <div class="key-card">
    <div class="key-title">⚙ Settings</div>
    <label class="key-label">Claude API Key <span class="key-req">(required)</span></label>
    <input id="api-key-input" type="password" class="key-input" placeholder="sk-ant-…">
    <label class="key-label">OpenAI Key — natural voice <span class="key-opt">(optional)</span></label>
    <input id="oai-key-input" type="password" class="key-input" placeholder="sk-… leave blank for device voice">
    <p class="key-note">Echo works fully with just the Claude key. OpenAI adds natural voice — enter once, works on all pages.</p>
    <div class="key-btns">
      <button onclick="saveKey()" class="key-save">Save</button>
      <button onclick="document.getElementById('key-overlay').style.display='none'" class="key-close">Close</button>
    </div>
  </div>
</div>

<script>
/* ▼▼▼ CONTENT ZONE — Claude replaces only this block each week ▼▼▼ */
const CHILD    = 'CL';
const DAY      = 'Thursday';
const WEEK     = 21;
const PTS_KEY  = 'pts_CL';
const BASE_PTS = 950;
const DICT_WORD = 'concede';
const DICT_DEF  = 'Verb — to admit that something is true or that your opponent has won, often reluctantly.';
const DICT_EG   = 'After a long debate, she had to concede that her opponent made a valid point.';
const RULES_TIPS = [
  'E5.2: Memory trick — INFERENCE = IN + TEXT. The evidence is always in the passage, not in your head.',
  'M2.1: Memory trick — LCD (Lowest Common Denominator). 1/3 + 1/4 → LCD is 12 → 4/12 + 3/12 = 7/12.',
  'E1.7: Memory trick — "A Rat In The House May Eat The Ice Cream" spells ARITHMETIC.',
];
// No MISSION_PACK on Thursday
const QUESTIONS = {
  0:{ section:'Vocab', code:'E4.1', correct:'B', star:false,
      text:'What does "feeble" mean?',
      opts:{A:'Very loud and powerful',B:'Lacking strength or effectiveness; weak',C:'Extremely large and heavy',D:'Moving with great energy'},
      vocabWord:'feeble' },
  1:{ section:'Vocab', code:'E4.2', correct:'D', star:false,
      text:'Which word means unpleasantly loud and harsh?',
      opts:{A:'Melodic',B:'Gentle',C:'Hushed',D:'Raucous'},
      vocabWord:'raucous' },
  2:{ section:'Vocab', code:'E4.3', correct:'A', star:false,
      text:'What does "nimble" mean?',
      opts:{A:'Quick and light in movement; agile',B:'Very heavy and slow',C:'Extremely clever at maths',D:'Very warm and comfortable'},
      vocabWord:'nimble' },
  3:{ section:'Vocab', code:'E4.4', correct:'C', star:true,
      text:'★ STAR — The old woman let out a lament when she heard the news. What is a "lament"?',
      opts:{A:'A loud, joyful celebration',B:'A long, difficult journey',C:'A passionate expression of grief or sorrow',D:'A quiet, private prayer'},
      vocabWord:'lament' },
  4:{ section:'English', code:'E5.2', correct:'A', star:false,
      text:'A passage says: "He hadn't touched his food and was staring at a spot on the wall." What can the reader infer?',
      opts:{A:'He is deeply troubled or distracted by something',B:'He dislikes the food that has been served',C:'He is looking for an insect on the wall',D:'He is feeling very happy about something'} },
  5:{ section:'English', code:'E5.4', correct:'C', star:false,
      text:'A writer says a character "shuffled" rather than "walked". What does this word choice suggest?',
      opts:{A:'The character is moving quickly and energetically',B:'The character is angry and in a hurry',C:'The character is tired, defeated, or reluctant to move',D:'The character is being careful not to make noise'} },
  6:{ section:'English', code:'E1.7', correct:'D', star:false,
      text:'Which word is spelled correctly?',
      opts:{A:'Perseverrence',B:'Perseverance',C:'Perseverance',D:'Perseverance'} },
  7:{ section:'English', code:'E3.1', correct:'B', star:false,
      text:'Which sentence correctly uses a comma after an introductory clause?',
      opts:{A:'Once the votes were counted the result, was announced.',B:'Once the votes were counted, the result was announced.',C:'Once the votes, were counted the result was announced.',D:'Once the votes were counted the result was, announced.'} },
  8:{ section:'English', code:'E2.6', correct:'A', star:false,
      text:'Which sentence is written in the present perfect tense?',
      opts:{A:'She has completed every challenge so far.',B:'She completed every challenge last week.',C:'She will complete every challenge.',D:'She completes every challenge.'} },
  9:{ section:'English', code:'E3.3', correct:'C', star:false,
      text:'Which sentence uses a colon correctly?',
      opts:{A:'She needed: to buy milk and bread.',B:'She: needed three things from the shop.',C:'She needed three things: milk, bread, and eggs.',D:'She needed three things, milk: bread and eggs.'} },
  10:{ section:'Maths', code:'M2.1', correct:'D', star:false,
       text:'What is one quarter plus two thirds?',
       opts:{A:'Three sevenths',B:'Two twelfths',C:'Eight twelfths',D:'Eleven twelfths'}, mathConcept:'fractions' },
  11:{ section:'Maths', code:'M2.1', correct:'A', star:false,
       text:'What is five sixths minus two ninths?',
       opts:{A:'Eleven eighteenths',B:'Three eighteenths',C:'Seven eighteenths',D:'Nine eighteenths'}, mathConcept:'fractions' },
  12:{ section:'Maths', code:'M1.7', correct:'B', star:false,
       text:'Round 6 point 847 to two decimal places.',
       opts:{A:'6 point 8',B:'6 point 85',C:'6 point 84',D:'6 point 9'}, mathConcept:'rounding' },
  13:{ section:'Maths', code:'M3.2', correct:'C', star:false,
       text:'A class has boys and girls in the ratio 5 to 3. There are 40 students in total. How many boys are there?',
       opts:{A:'15',B:'20',C:'25',D:'30'}, mathConcept:'ratio' },
  14:{ section:'Maths', code:'M5.4', correct:'A', star:false,
       text:'A cuboid is 5 centimetres long, 4 centimetres wide and 3 centimetres tall. What is its volume?',
       opts:{A:'60 cubic centimetres',B:'47 cubic centimetres',C:'48 cubic centimetres',D:'24 cubic centimetres'}, mathConcept:'volume' },
  15:{ section:'Maths', code:'M1.9', correct:'B', star:false,
       text:'What is 15 percent of 60?',
       opts:{A:'6',B:'9',C:'12',D:'15'}, mathConcept:'percentages' },
};
/* ▲▲▲ END CONTENT ZONE ▲▲▲ */

// ─── PERMANENT ZONE — do not edit below ──────────────────────────────────────

const TOTAL_QS   = 16;
const PASS_SCORE = 13;
const WEBHOOK    = 'https://hook.eu1.make.com/tp5602e5nihsmd7ee47wuoqur97y2rkx';
const WRITING_DAYS  = ['Monday','Wednesday','Friday'];
const RULE_STYLES   = {Monday:'weapons',Tuesday:'watchout',Wednesday:'protips',Thursday:'memory',Friday:'weapons'};
const RULE_HEADERS  = {weapons:"⚡ TODAY'S WEAPONS",watchout:'⚠️ WATCH OUT FOR THESE',protips:'🏆 PRO TIPS FOR TODAY',memory:'🧠 QUICK MEMORY TRICKS'};
const CHILD_AGE     = CHILD==='IL' ? 7 : 9;
const MAX_WORDS     = CHILD==='IL' ? 70 : 90;

const CHARS = {
  snake:{key:'snake',name:'Ssssam',emoji:'🐍',gotIt:"Sssuper! That's ssso good — onto the next one!",

let _cachedVoice=null, _audioWarmed=false;

// Day-lock character
(()=>{const td=new Date().toISOString().slice(0,10);let ck=localStorage.getItem('char_date')===td?localStorage.getItem('char_key'):null;if(!ck||!CHARS[ck]){ck=Math.random()>.5?'snake':'shark';localStorage.setItem('char_key',ck);localStorage.setItem('char_date',td);}CHAR=CHARS[ck];document.body.classList.add(ck);})();

// ── TTS ───────────────────────────────────────────────────────────────────────
function cleanForSpeech(t){return t.replace(/_{3,}/g,'blank').replace(/_{1,2}/g,'').replace(/\*\*/g,'').replace(/\*/g,'').replace(/#{1,6}\s/g,'').replace(/\b(\d+)\s*%/g,'$1 percent').replace(/¾/g,'three quarters').replace(/½/g,'half').replace(/¼/g,'one quarter').trim();}
const _PREF=['Daniel','Serena','Moira','Rishi','Oliver','Karen','Samantha'];
window.speechSynthesis.onvoiceschanged=()=>{const vs=window.speechSynthesis.getVoices();for(const n of _PREF){const v=vs.find(x=>x.name.startsWith(n)&&x.lang.startsWith('en'));if(v){_cachedVoice=v;break;}}if(!_cachedVoice)_cachedVoice=vs.find(v=>v.lang.startsWith('en-GB'))||vs.find(v=>v.lang.startsWith('en'))||null;};
function _iosWarm(){try{if(window.speechSynthesis.speaking)return;const w=new SpeechSynthesisUtterance('\u00A0');w.volume=0.01;w.rate=16;window.speechSynthesis.speak(w);}catch(e){}}
function speakWebSpeech(text){try{if(window.speechSynthesis.paused)window.speechSynthesis.resume();}catch(e){}window.speechSynthesis.cancel();setTimeout(()=>{const u=new SpeechSynthesisUtterance(text);if(_cachedVoice)u.voice=_cachedVoice;u.rate=CHAR.key==='snake'?.92:.98;u.pitch=CHAR.key==='snake'?.95:1.02;u.volume=1;u.onend=()=>{try{const k=new SpeechSynthesisUtterance('\u00A0');k.volume=0.01;k.rate=16;window.speechSynthesis.speak(k);}catch(e){}};u.onerror=()=>{setTimeout(()=>window.speechSynthesis.speak(u),250);};window.speechSynthesis.speak(u);},120);}
async function speakOpenAI(text){try{_oaiController=new AbortController();const resp=await fetch('https://api.openai.com/v1/audio/speech',{method:'POST',signal:_oaiController.signal,headers:{'Authorization':'Bearer '+OPENAI_KEY,'Content-Type':'application/json'},body:JSON.stringify({model:'tts-1-hd',input:text,voice:CHAR.key==='snake'?'fable':'echo',speed:CHAR.key==='snake'?.92:.97})});if(resp.status===401){localStorage.removeItem('openai_key_v1');OPENAI_KEY=null;updateVoicePill();speakWebSpeech(text);return;}if(!resp.ok){speakWebSpeech(text);return;}const blob=await resp.blob();_oaiObjectUrl=URL.createObjectURL(blob);_oaiAudio=new Audio(_oaiObjectUrl);_oaiAudio.onended=()=>{URL.revokeObjectURL(_oaiObjectUrl);_oaiObjectUrl=null;_oaiAudio=null;};await _oaiAudio.play();}catch(e){if(e.name!=='AbortError')speakWebSpeech(text);}}
async function speak(text){if(!text)return;const c=cleanForSpeech(text);hardStop();if(OPENAI_KEY){await speakOpenAI(c);}else{speakWebSpeech(c);}}
function _warmAudio(){if(_audioWarmed)return;try{const a=new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');a.volume=0;a.play().then(()=>{a.pause();_audioWarmed=true;}).catch(()=>{_audioWarmed=true;});}catch(e){_audioWarmed=true;}}
document.addEventListener('touchstart',_warmAudio,{once:true,passive:true});
document.addEventListener('click',_warmAudio,{once:true});
function updateVoicePill(){const p=document.getElementById('voice-pill');if(OPENAI_KEY){p.textContent='🔊 Natural';p.className='voice-pill natural';}else{p.textContent='🔊 Device';p.className='voice-pill';}}

// ── HARD STOP v3.15 — kills OpenAI Audio + AbortController + Web Speech ──────
function hardStop(){
  if(_oaiController){_oaiController.abort();_oaiController=null;}
  if(_oaiAudio){_oaiAudio.pause();_oaiAudio.src='';_oaiAudio=null;}
  if(_oaiObjectUrl){URL.revokeObjectURL(_oaiObjectUrl);_oaiObjectUrl=null;}
  try{window.speechSynthesis.pause();}catch(e){}
  try{window.speechSynthesis.cancel();}catch(e){}
}

// ── MIC (v3.14) ───────────────────────────────────────────────────────────────
function toggleMic(){
  _iosWarm();
  if(micActive){recognition?.stop();micActive=false;document.getElementById('mbtn').classList.remove('listening');document.getElementById('mstat').textContent='Tap 🎤 to speak, or type below';return;}
  if(!window.SpeechRecognition&&!window.webkitSpeechRecognition){document.getElementById('speech-text').placeholder='Type here — mic not supported';return;}
  recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
  recognition.lang='en-GB';recognition.interimResults=false;recognition.continuous=false;recognition.maxAlternatives=1;
  recognition.onresult=(e)=>{micActive=false;document.getElementById('mbtn').classList.remove('listening');document.getElementById('mstat').textContent='✏️ Edit if needed, then tap Send!';document.getElementById('speech-text').value=e.results[0][0].transcript;};
  recognition.onerror=(e)=>{micActive=false;document.getElementById('mbtn').classList.remove('listening');document.getElementById('mstat').textContent=e.error==='not-allowed'?'Mic blocked — Settings → Safari → Microphone':e.error==='no-speech'?'Nothing heard — tap to try again':'Could not hear — type below';};
  recognition.onend=()=>{if(micActive){micActive=false;document.getElementById('mbtn').classList.remove('listening');}};
  micActive=true;document.getElementById('mbtn').classList.add('listening');document.getElementById('mstat').textContent='⏳ Get ready… 2 seconds…';
  recognition.start();
  setTimeout(()=>{if(micActive)document.getElementById('mstat').textContent='● Listening… speak now!';},2000);
}
function submitSpeech(){const txt=(document.getElementById('speech-text').value||'').trim();if(!txt)return;document.getElementById('speech-text').value='';if(recognition){try{recognition.stop();}catch(e){}}micActive=false;if(currentQIdx===-2){sendDictReply(txt);}else{sendTutorReply(txt);}}

// ── OVERLAY ───────────────────────────────────────────────────────────────────
function charTurns(sec){return CHILD==='IL'?5:(sec==='Vocab'||sec==='Dictionary'?6:7);}
function renderDots(qi){const t=tutorTurns[qi]||0,cap=charTurns(QUESTIONS[qi]?.section),d=document.getElementById('dots');d.innerHTML='';for(let i=0;i<cap;i++){const s=document.createElement('span');s.className='dot'+(i<t?' used':'');d.appendChild(s);}}

// ── AI TUTORING ───────────────────────────────────────────────────────────────
async function callAI(qi){
  if(!API_KEY){addBubble('Add your Claude API key in ⚙ Settings to unlock Echo!','echo');return;}
  const q=QUESTIONS[qi],history=tutorHistory[qi]||[],turn=(tutorTurns[qi]||0)+1,cap=charTurns(q.section);
  const strict=`ABSOLUTE RULE — FIRST REPLY ONLY:\nOpen with ONE short funny joke about the topic.\nAfter the joke: straight to teaching. No greeting.\nPlain spoken English. No emoji. No asterisks. No markdown.\nMax ${MAX_WORDS} words. NEVER say: wrong, incorrect, failed, mistake, silly, dumb.\n★ ADVANCE each turn — never repeat. Every turn: different angle.\n[Turn ${turn} of up to ${cap}.]`;
  const msgs=[...history];
  if(!msgs.length)msgs.push({role:'user',content:`Question: ${q.text}\nCorrect answer: ${q.opts[q.correct]}\nCode: ${q.code}. Child answered incorrectly. Teach this now.`});
  showTyping();
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,system:CHAR.pers+'\n\n'+strict,messages:msgs})});
    removeTyping();if(!r.ok){addBubble('Connection error — check API key in ⚙ Settings.','echo');return;}
    const text=r.ok?(await r.json()).content[0].text:'Error';
    addBubble(text,'echo');speak(text);
    const h=tutorHistory[qi]||[];h.push({role:'assistant',content:text});tutorHistory[qi]=h;
    tutorTurns[qi]=(tutorTurns[qi]||0)+1;renderDots(qi);
  }catch(e){removeTyping();addBubble('Something went wrong — try again.','echo');}
}
function sendTutorReply(text){addBubble(text,'user');const qi=currentQIdx,h=tutorHistory[qi]||[];h.push({role:'user',content:text});tutorHistory[qi]=h;callAI(qi);}

// ── ANSWER (v3.14) ────────────────────────────────────────────────────────────
const SC=['Ssslick!','Ssspot on!','Sssuper!','High tail!'],SH=['Fin-tastic!','Splashing great!','Making waves!','Dorsal bump!'];
function onCorrectAnswer(){if(overlayOpen)return;speak(CHAR.key==='snake'?SC[Math.floor(Math.random()*SC.length)]:SH[Math.floor(Math.random()*SH.length)]);}

function answer(qi,choice){
  _iosWarm();
  if(answers[qi]!==undefined||!rulesRead)return;  // v3.14 gate
  answers[qi]=choice;
  const q=QUESTIONS[qi],isRight=choice===q.correct;
  'ABCD'.split('').forEach(k=>document.getElementById(`opt-${qi}-${k}`)?.classList.add('dis'));
  document.getElementById(`opt-${qi}-${choice}`)?.classList.add(isRight?'sc':'sw');
  document.getElementById(`qc-${qi}`)?.classList.add(isRight?'right':'wrong');
  if(!isRight)document.getElementById(`opt-${qi}-${q.correct}`)?.classList.add('rc2');
  tutorTurns[qi]=0;
  if(isRight){onCorrectAnswer();}else{openOverlay(qi);}
  if(!firstAttempt&&Object.keys(answers).length===TOTAL_QS)firstAttempt={...answers};
  updateSubmit();
}
function updateSubmit(){
  const pts=parseInt(localStorage.getItem(PTS_KEY)||BASE_PTS);
  document.getElementById('pts-display').textContent=`⭐ ${pts} pts — ${Object.keys(answers).length}/${TOTAL_QS} answered`;
  document.getElementById('sub-btn').disabled=Object.keys(answers).length<TOTAL_QS||!rulesRead;
}

// ── SUBMIT & REMEDIATION ──────────────────────────────────────────────────────
function handleSubmit(){
  let correct=0;const wrong=[];
  for(let i=0;i<TOTAL_QS;i++){if(answers[i]===QUESTIONS[i].correct)correct++;else wrong.push(i);}
  if(wrong.length&&!remMode){startRemediation(wrong);return;}
  let pts=correct>=PASS_SCORE?3:0;
  for(let j=0;j<TOTAL_QS;j++){if(QUESTIONS[j].star&&firstAttempt?.[j]===QUESTIONS[j].correct)pts+=2;}
  if(writingDone)pts+=1;
  showResult(correct,pts);
}
function startRemediation(wrong){
  remMode=true;wrongQs=wrong;remIdx=0;
  document.getElementById('sub-bar').style.display='none';
  document.getElementById('remed-banner').style.display='block';
  document.getElementById('rem-msg').textContent=`${CHAR.name} wants to help with ${wrong.length} question${wrong.length>1?'s':''}!`;
  setTimeout(()=>openOverlay(wrongQs[0]),600);
}
function advanceRemediation(){remIdx++;if(remIdx<wrongQs.length){setTimeout(()=>openOverlay(wrongQs[remIdx]),300);}else{startMiniRetest();}}
function startMiniRetest(){
  remMode=false;
  document.getElementById('remed-banner').style.display='none';
  document.getElementById('sub-bar').style.display='flex';
  wrongQs.forEach(qi=>{
    answers[qi]=undefined;
    'ABCD'.split('').forEach(k=>{document.getElementById(`opt-${qi}-${k}`)?.classList.remove('sc','sw','rc2','dis');});
    document.getElementById(`qc-${qi}`)?.classList.remove('right','wrong');
  });
  speak('Your turn — try those questions again!');updateSubmit();
}

// ── RESULT ────────────────────────────────────────────────────────────────────
function showResult(correct,pts){
  document.getElementById('ex-wrap').style.display='none';
  document.getElementById('sub-bar').style.display='none';
  document.getElementById('remed-banner').style.display='none';
  document.getElementById('rw').style.display='none';
  const pct=Math.round(correct/TOTAL_QS*100),pass=correct>=PASS_SCORE;
  document.getElementById('res-emoji').textContent=pass?'🎉':'💪';
  document.getElementById('res-score').textContent=`${correct}/${TOTAL_QS} — ${pct}%`;
  document.getElementById('res-msg').textContent=pass?`${CHAR.name} is proud — brilliant work today!`:`Good effort! ${CHAR.name} helped you review — you are getting stronger!`;
  const stored=parseInt(localStorage.getItem(PTS_KEY)||BASE_PTS),newPts=stored+pts;
  localStorage.setItem(PTS_KEY,newPts);
  document.getElementById('res-pts').textContent=pts>0?`+${pts} pts today — total: ${newPts} ⭐`:`Total: ${newPts} ⭐`;
  document.getElementById('result').style.display='flex';
  window.scrollTo(0,0);sendWebhook(correct,pts);
}
async function sendWebhook(correct,pts){
  const fa=firstAttempt||answers;let fp=0;for(let j=0;j<TOTAL_QS;j++){if(fa[j]===QUESTIONS[j]?.correct)fp++;}
  try{await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'exercise_result',child:CHILD,day:DAY,week:WEEK,date:new Date().toISOString().slice(0,10),score:Math.round(correct/TOTAL_QS*100),firstAttemptScore:Math.round(fp/TOTAL_QS*100),pointsEarned:pts,questions:Object.entries(QUESTIONS).map(([i,q])=>({code:q.code,section:q.section,correct:answers[+i]===q.correct}))})});}catch(e){}
}

// ── DICTIONARY ────────────────────────────────────────────────────────────────
function pickRevisionWord(){try{const h=JSON.parse(localStorage.getItem('dict_history')||'[]'),today=new Date().toISOString().slice(0,10),el=h.filter(w=>w.date!==today&&w.word!==DICT_WORD);if(!el.length)return null;const now=Date.now();el.forEach(w=>{const d=(now-new Date(w.date).getTime())/86400000,c=w.confidence==='low'?3:w.confidence==='medium'?2:1;w._s=c+(d<2?-10:Math.min(d/7,3));});return el.sort((a,b)=>b._s-a._s)[0];}catch(e){return null;}}
function initDict(){
  const ds=document.getElementById('dict-section'),rev=pickRevisionWord(),esc=s=>(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  ds.innerHTML=`<div class="dict-wrap"><div class="section-label" style="color:rgba(255,255,255,.8)">📖 Dictionary</div><div class="dict-word">${DICT_WORD}</div><div class="dict-def">${DICT_DEF}</div><div class="dict-eg">"${DICT_EG}"</div><button class="dict-btn" onclick="openDictOverlay('${esc(DICT_WORD)}','${esc(DICT_DEF)}','${esc(DICT_EG)}')">Ask ${CHAR.name} about this word</button>${rev?`<div class="rev-block"><div class="rev-word">🔄 Past word: ${rev.word}</div><div class="rev-def">${rev.def||''}</div><button class="dict-btn" style="margin-top:8px" onclick="openDictOverlay('${esc(rev.word)}','${esc(rev.def||'')}','')">Ask ${CHAR.name} to test me!</button></div>`:''}</div>`;
  const h=JSON.parse(localStorage.getItem('dict_history')||'[]');if(!h.find(w=>w.word===DICT_WORD)){h.push({word:DICT_WORD,def:DICT_DEF,date:new Date().toISOString().slice(0,10),confidence:'medium'});localStorage.setItem('dict_history',JSON.stringify(h));}
}

// ── BUILD SECTIONS ────────────────────────────────────────────────────────────
function buildSections(){
  const cfg={Vocab:{id:'vocab-section',label:'📚 Vocab',cls:'vocab-card'},English:{id:'english-section',label:'✏️ English',cls:'english-card'},Maths:{id:'maths-section',label:'🔢 Maths',cls:'maths-card'}};
  Object.entries(cfg).forEach(([sec,c])=>{
    const qs=Object.entries(QUESTIONS).filter(([,q])=>q.section===sec);
    document.getElementById(c.id).innerHTML=`<div class="section-card ${c.cls}"><div class="section-label">${c.label}</div>${qs.map(([i,q])=>`<div class="qc" id="qc-${i}"><div class="q-text">${q.star?'<span class="q-star">★ </span>':''}${q.text}</div><div class="opts">${['A','B','C','D'].map(k=>`<button class="opt" id="opt-${i}-${k}" onclick="answer(${i},'${k}')"><span class="ok">${k}</span>${q.opts[k]}</button>`).join('')}</div></div>`).join('')}</div>`;
  });
  if(typeof MISSION_PACK!=='undefined'&&WRITING_DAYS.includes(DAY)){
    const ws=document.getElementById('writing-section');ws.style.display='block';
    ws.innerHTML=`<div class="section-card writing-card"><div class="section-label">✍️ Writing Challenge</div><div class="writing-prompt"><div class="mission-id">${MISSION_PACK.id}</div><div class="mission-title">${MISSION_PACK.title}</div><div class="mission-codes">${MISSION_PACK.codes.map(c=>`<span class="code-tag">${c}</span>`).join('')}</div><div class="mission-prompt">${MISSION_PACK.prompt}</div></div><textarea class="writing-ta" id="writing-ta" rows="5" placeholder="Write your response here… aim for 3–5 sentences!"></textarea><button class="writing-send-btn" onclick="sendWriting()">Send to Echo ➤</button><div id="writing-feedback" class="writing-fb"></div></div>`;
  }
}
function buildRulesCard(){const style=RULE_STYLES[DAY]||'weapons';document.getElementById('rh-title').textContent=(RULE_HEADERS[style]||"⚡ TODAY'S WEAPONS")+' — tap to read';document.getElementById('rules-tips').innerHTML=RULES_TIPS.map(tip=>{const m=tip.match(/^([\w.]+):\s*(.*)/);return m?`<div class="tip-row"><span class="tip-code">${m[1]}</span><span>${m[2]}</span></div>`:`<div class="tip-row">${tip}</div>`;}).join('');}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.onload=()=>{
  document.getElementById('hdr-title').textContent=`${CHILD} — ${DAY}`;
  document.getElementById('hdr-sub').textContent=`Week ${WEEK}`;
  document.getElementById('hdr-char').textContent=CHAR.emoji;
  document.getElementById('ov-char').textContent=CHAR.emoji;
  document.title=`${CHILD} — ${DAY} · Week ${WEEK}`;
  updateVoicePill();buildRulesCard();buildSections();updateSubmit();initDict();
};
</script>
