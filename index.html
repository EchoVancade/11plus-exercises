<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11+ Daily Exercise</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:400px;width:100%;text-align:center}
.title{font-size:22px;font-weight:800;color:#1e293b;margin-bottom:6px}
.sub{font-size:14px;color:#64748b;margin-bottom:40px}
.cards{display:flex;flex-direction:column;gap:16px}
.card{display:block;padding:28px 24px;border-radius:20px;text-decoration:none;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px)}
.card.cl{background:linear-gradient(135deg,#0f172a,#1e3a5f);border:2px solid #f59e0b;box-shadow:0 8px 32px rgba(245,158,11,0.2)}
.card.il{background:linear-gradient(135deg,#4c1d95,#7c3aed);box-shadow:0 8px 32px rgba(124,58,237,0.25)}
.card-emoji{font-size:40px;margin-bottom:10px}
.card-name{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px}
.card-sub{font-size:13px;color:rgba(255,255,255,0.65)}
.day-badge{display:inline-block;margin-top:10px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.cl .day-badge{background:#f59e0b;color:#0f172a}
.il .day-badge{background:#fbbf24;color:#1e1b4b}
.footer{margin-top:32px;font-size:12px;color:#94a3b8}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">📚 11+ Daily Exercise</div>
  <div class="sub">Choose your name to start today's mission</div>
  <div class="cards">
    <a class="card cl" href="CL/index.html">
      <div class="card-emoji">🎯</div>
      <div class="card-name">CL</div>
      <div class="card-sub">Vocabulary · Spelling · Maths · Dictionary</div>
      <div class="day-badge" id="cl-day">Loading...</div>
    </a>
    <a class="card il" href="IL/index.html">
      <div class="card-emoji">⭐</div>
      <div class="card-name">IL</div>
      <div class="card-sub">Maths · English · Dictionary</div>
      <div class="day-badge" id="il-day">Loading...</div>
    </a>
  </div>
  <div class="footer">Results save automatically to Notion</div>
</div>
<script>
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const day = days[new Date().getDay()];
document.getElementById('cl-day').textContent = day + "'s Mission";
document.getElementById('il-day').textContent = day + "'s Stars";
</script>
</body>
</html>
